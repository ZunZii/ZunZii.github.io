<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英単語4択クイズ</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d7dee8;
      --paper: #fbfcfe;
      --panel: #ffffff;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --good: #15803d;
      --good-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --warn: #b45309;
      --warn-soft: #ffedd5;
      --shadow: 0 18px 50px rgba(31, 41, 55, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, .08), transparent 34%),
        linear-gradient(315deg, rgba(21, 128, 61, .08), transparent 38%),
        var(--paper);
      color: var(--ink);
    }

    button,
    select {
      font: inherit;
    }

    button:disabled {
      cursor: default;
    }

    .app {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .quiz-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0;
    }

    .quiz-tab {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 1px 0 rgba(31, 41, 55, .04);
    }

    .quiz-tab.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .select-wrap,
    .ghost-button,
    .file-label {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 1px 0 rgba(31, 41, 55, .04);
    }

    select {
      width: 148px;
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 12px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
    }

    .ghost-button,
    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .ghost-button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1d4ed8;
      font-weight: 800;
    }

    .file-label input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      padding: clamp(18px, 3vw, 30px);
    }

    .csv-status {
      margin: 0 0 20px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e5eaf2;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--good));
      transition: width .22s ease;
    }

    .timer-panel {
      display: none;
      margin: -8px 0 24px;
    }

    .timer-panel.active {
      display: block;
    }

    .timer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .timer-track {
      position: relative;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #e5eaf2;
      border: 1px solid rgba(100, 116, 139, .28);
    }

    .timer-fill {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #16a34a, #eab308, #dc2626);
      transform-origin: left center;
      transform: scaleX(1);
      transition: transform .08s linear;
    }

    .timer-panel.urgent .timer-fill {
      background: #dc2626;
    }

    .count {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .prompt-label {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .word {
      margin: 0;
      font-size: clamp(42px, 9vw, 82px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      min-height: 24px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    .choice {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-weight: 800;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .choice:hover:not(:disabled),
    .choice:focus-visible {
      transform: translateY(-1px);
      border-color: var(--primary);
      outline: 3px solid var(--primary-soft);
    }

    .choice.correct {
      border-color: var(--good);
      background: var(--good-soft);
      color: #14532d;
    }

    .choice.wrong {
      border-color: var(--bad);
      background: var(--bad-soft);
      color: #7f1d1d;
    }

    .feedback {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 62px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .feedback strong {
      display: block;
      margin-bottom: 2px;
    }

    .next-button,
    .primary-button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      padding: 0 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .next-button:disabled,
    .primary-button:disabled {
      opacity: .45;
    }

    .side-panel {
      padding: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
    }

    .side-title {
      margin: 18px 0 10px;
      font-size: 16px;
    }

    .review-list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .review-item strong {
      display: block;
    }

    .review-item span,
    .empty,
    .csv-help {
      color: var(--muted);
      font-size: 13px;
    }

    .csv-help {
      margin: 12px 0 0;
      line-height: 1.55;
    }

    .result {
      display: none;
      min-height: 430px;
      place-items: center;
      text-align: center;
    }

    .result.active {
      display: grid;
    }

    .result h2 {
      margin: 0;
      font-size: clamp(32px, 7vw, 58px);
      letter-spacing: 0;
    }

    .result p {
      color: var(--muted);
      font-size: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--warn-soft);
      color: var(--warn);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 980px);
        padding: 18px 0;
      }

      .topbar,
      .layout,
      .feedback {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .quiz-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        justify-content: stretch;
      }

      .select-wrap,
      .ghost-button,
      .file-label {
        flex: 1 1 140px;
      }

      .choices,
      .stats {
        grid-template-columns: 1fr;
      }

      .next-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1 id="appTitle">英単語4択クイズ</h1>
        <p class="subtitle" id="appSubtitle">CSVを編集すると、単語・正解・選択肢をまとめて管理できます。</p>
      </div>
      <div class="toolbar" aria-label="クイズ設定">
        <span class="select-wrap">
          <select id="levelSelect" aria-label="レベル"></select>
        </span>
        <label class="file-label">
          CSV読込
          <input id="csvInput" type="file" accept=".csv,text/csv">
        </label>
        <button class="ghost-button" id="timerToggle" type="button" aria-pressed="false">時間 OFF</button>
        <span class="select-wrap">
          <select id="timerSelect" aria-label="制限時間">
            <option value="5">5秒</option>
            <option value="10">10秒</option>
            <option value="15">15秒</option>
            <option value="20">20秒</option>
            <option value="30">30秒</option>
          </select>
        </span>
        <button class="ghost-button" id="soundToggle" type="button" aria-pressed="true">音声 ON</button>
        <button class="ghost-button" id="resetButton" type="button">リセット</button>
      </div>
    </header>

    <nav class="quiz-tabs" id="quizTabs" aria-label="クイズ切り替え"></nav>

    <section class="layout">
      <div class="quiz-panel">
        <p class="csv-status" id="csvStatus">CSVを読み込み中です。</p>

        <div id="quizView">
          <div class="progress-row">
            <div class="progress" aria-label="進捗"><span id="progressBar"></span></div>
            <div class="count" id="countText">1 / 10</div>
          </div>

          <div class="timer-panel" id="timerPanel" aria-live="polite">
            <div class="timer-meta">
              <span>回答時間</span>
              <span id="timerText">10.0秒</span>
            </div>
            <div class="timer-track" aria-label="残り時間">
              <span class="timer-fill" id="timerFill"></span>
            </div>
          </div>

          <p class="prompt-label" id="promptLabel">この英単語の意味は？</p>
          <h2 class="word" id="wordText">loading</h2>
          <p class="hint" id="hintText">分類: -</p>

          <div class="choices" id="choices"></div>

          <div class="feedback" aria-live="polite">
            <div>
              <strong id="feedbackTitle">答えを選んでください</strong>
              <span id="feedbackText">4つの選択肢から日本語の意味を選びます。</span>
            </div>
            <button class="next-button" id="nextButton" type="button" disabled>次へ</button>
          </div>
        </div>

        <div class="result" id="resultView">
          <div>
            <div class="badge" id="resultBadge">完了</div>
            <h2 id="resultScore">0 / 10</h2>
            <p id="resultMessage">もう一度チャレンジしましょう。</p>
            <button class="primary-button" id="againButton" type="button">もう一度</button>
          </div>
        </div>
      </div>

      <aside class="side-panel" aria-label="成績と復習">
        <div class="stats">
          <div class="stat">
            <span>正解</span>
            <strong id="correctStat">0</strong>
          </div>
          <div class="stat">
            <span>正答率</span>
            <strong id="rateStat">0%</strong>
          </div>
        </div>
        <button class="primary-button" id="reviewButton" type="button">間違えた問題を出題</button>
        <h3 class="side-title">復習リスト</h3>
        <div class="review-list" id="reviewList">
          <p class="empty">まだ間違えた単語はありません。</p>
        </div>
        <p class="csv-help" id="csvHelp">CSV列: level, word, answer, part, choice1, choice2, choice3</p>
      </aside>
    </section>
  </main>

    const state = {

      timerToggle: document.querySelector("#timerToggle"),
      timerSelect: document.querySelector("#timerSelect"),
      timerPanel: document.querySelector("#timerPanel"),
      timerText: document.querySelector("#timerText"),

      resultMessage: document.querySelector("#resultMessage"),

    const levelLabels = {
      basic: "基礎",
      travel: "旅行",
      business: "ビジネス",
      strategy: "戦略",
      finance: "会計",
      security: "セキュリティ",
      web: "Web",
      data: "データ",
      indicator: "指標",
      trade: "注文",
      market: "市場",
      mixed: "ミックス"
    };

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          value += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(value);
          if (row.some(cell => cell.trim() !== "")) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      row.push(value);
      if (row.some(cell => cell.trim() !== "")) rows.push(row);
      return rows;
    }

    function normalizeCsv(text) {
      const rows = parseCsv(text.trim());
      if (rows.length < 2) {
        throw new Error("CSVに単語データがありません。");
      }

      const header = rows[0].map(cell => cell.trim().toLowerCase());
      const find = name => header.indexOf(name);
      const indexes = {
        level: find("level"),
        word: find("word"),
        answer: find("answer"),
        part: find("part"),
        choices: [find("choice1"), find("choice2"), find("choice3")]
      };

      if (indexes.word < 0 || indexes.answer < 0) {
        throw new Error("CSVには word と answer の列が必要です。");
      }

      const bank = {};
      rows.slice(1).forEach(row => {
        const word = (row[indexes.word] || "").trim();
        const answer = (row[indexes.answer] || "").trim();
        const level = ((row[indexes.level] || "default").trim() || "default").toLowerCase();
        const part = (row[indexes.part] || "-").trim() || "-";
        const choices = indexes.choices
          .map(index => (row[index] || "").trim())
          .filter(choice => choice && choice !== answer);

        if (!word || !answer) return;
        if (!bank[level]) bank[level] = [];
        bank[level].push({ word, answer, part, choices, level });
      });

      if (!Object.values(bank).some(items => items.length)) {
        throw new Error("使える単語データが見つかりません。");
      }

      return bank;
    }

    function currentQuiz() {
      return quizzes[state.activeQuiz] || quizzes.english;
    }

    function mistakeKey() {
      return `quizMistakes:${state.activeQuiz}`;
    }

    function loadMistakes() {
      state.mistakes = JSON.parse(localStorage.getItem(mistakeKey()) || "[]");
    }

    function saveMistakes() {
      localStorage.setItem(mistakeKey(), JSON.stringify(state.mistakes));
    }

    function renderQuizTabs() {
      els.quizTabs.innerHTML = "";
      Object.entries(quizzes).forEach(([id, quiz]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `quiz-tab${id === state.activeQuiz ? " active" : ""}`;
        button.textContent = quiz.tab;
        button.setAttribute("aria-pressed", String(id === state.activeQuiz));
        button.addEventListener("click", () => {
          if (state.activeQuiz === id) return;
          state.activeQuiz = id;
          state.level = "mixed";
          localStorage.setItem("activeQuiz", id);
          loadCsv();
        });
        els.quizTabs.append(button);
      });
    }

    function renderQuizChrome() {
      const quiz = currentQuiz();
      els.appTitle.textContent = quiz.title;
      els.appSubtitle.textContent = quiz.subtitle;
      els.promptLabel.textContent = quiz.prompt;
      els.reviewButton.textContent = quiz.reviewLabel;
      els.csvHelp.textContent = `CSV列: level, word, answer, part, choice1, choice2, choice3 / 現在: ${quiz.csv}`;
      els.soundToggle.disabled = !quiz.speak;
      els.soundToggle.textContent = quiz.speak ? (state.sound ? "音声 ON" : "音声 OFF") : "音声なし";
      els.soundToggle.setAttribute("aria-pressed", String(quiz.speak && state.sound));
      renderQuizTabs();
    }

    function renderTimerControls() {
      els.timerToggle.textContent = state.timerEnabled ? "時間 ON" : "時間 OFF";
      els.timerToggle.classList.toggle("active", state.timerEnabled);
      els.timerToggle.setAttribute("aria-pressed", String(state.timerEnabled));
      els.timerSelect.value = String(state.timerSeconds);
      els.timerPanel.classList.toggle("active", state.timerEnabled);
      if (!state.timerEnabled) {
        els.timerText.textContent = `${state.timerSeconds}.0秒`;
        els.timerFill.style.transform = "scaleX(1)";
        els.timerPanel.classList.remove("urgent");
      }
    }

    function stopTimer() {
      if (state.timerId) {
        window.clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function updateTimerView() {
      const ratio = Math.max(0, state.timerRemaining / state.timerSeconds);
      els.timerText.textContent = `${state.timerRemaining.toFixed(1)}秒`;
      els.timerFill.style.transform = `scaleX(${ratio})`;
      els.timerPanel.classList.toggle("urgent", ratio <= 0.25);
    }

    function startTimer() {
      stopTimer();
      if (!state.timerEnabled || state.answered) {
        renderTimerControls();
        return;
      }

      state.timerStartedAt = Date.now();
      state.timerRemaining = state.timerSeconds;
      renderTimerControls();
      updateTimerView();
      state.timerId = window.setInterval(() => {
        const elapsed = (Date.now() - state.timerStartedAt) / 1000;
        state.timerRemaining = Math.max(0, state.timerSeconds - elapsed);
        updateTimerView();
        if (state.timerRemaining <= 0) {
          stopTimer();
          timeUp();
        }
      }, 80);
    }

    async function loadCsv() {
      const quiz = currentQuiz();
      renderQuizChrome();
      loadMistakes();
      els.csvStatus.textContent = `${quiz.csv} を読み込み中です。`;
      try {
        const response = await fetch(quiz.csv, { cache: "no-store" });
        if (!response.ok) throw new Error(`${quiz.csv}を読めませんでした。`);
        applyWordBank(normalizeCsv(await response.text()), quiz.csv);
      } catch (error) {
        applyWordBank(normalizeCsv(fallbackCsvs[state.activeQuiz] || fallbackCsvs.english), "内蔵データ");
        els.csvStatus.textContent = `${quiz.csv}が読めないため、内蔵データで開始しました。CSV読込から差し替えできます。`;
      }
    }

    function applyWordBank(bank, sourceName) {
      state.wordBank = bank;
      renderLevels();
      els.csvStatus.textContent = `${sourceName} を読み込みました。単語数: ${allWords("mixed").length}`;
      startQuiz();
    }

    function renderLevels() {
      const levels = Object.keys(state.wordBank).sort();
      const current = levels.includes(state.level) ? state.level : "mixed";
      els.levelSelect.innerHTML = "";

      const mixed = document.createElement("option");
      mixed.value = "mixed";
      mixed.textContent = levelLabels.mixed;
      els.levelSelect.append(mixed);

      levels.forEach(level => {
        const option = document.createElement("option");
        option.value = level;
        option.textContent = levelLabels[level] || level;
        els.levelSelect.append(option);
      });

      state.level = current;
      els.levelSelect.value = current;
    }

    function allWords(level = state.level) {
      if (level === "mixed") {
        return Object.values(state.wordBank).flat();
      }
      return state.wordBank[level] || [];
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function makeQuestions(source) {
      const pool = source.length >= quizSize ? shuffle(source).slice(0, quizSize) : shuffle(source);
      const allAnswers = allWords("mixed").map(item => item.answer);

      return pool.map(item => {
        const csvChoices = item.choices || [];
        const randomChoices = shuffle(allAnswers.filter(answer => answer !== item.answer && !csvChoices.includes(answer)));
        const wrong = [...csvChoices, ...randomChoices].slice(0, 3);
        return {
          ...item,
          choices: shuffle([item.answer, ...wrong])
        };
      });
    }

    function startQuiz(source = allWords()) {
      stopTimer();
      if (!source.length) {
        els.wordText.textContent = "-";
        els.hintText.textContent = "CSVに問題を追加してください。";
        els.choices.innerHTML = "";
        els.nextButton.disabled = true;
        return;
      }

      state.questions = makeQuestions(source);
      state.index = 0;
      state.score = 0;
      state.answered = false;
      state.selected = null;
      els.quizView.classList.remove("hidden");
      els.resultView.classList.remove("active");
      renderQuestion();
      renderStats();
      renderReview();
    }

    function speak(word) {
      if (!currentQuiz().speak || !state.sound || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      window.speechSynthesis.speak(utterance);
    }

    function renderQuestion() {
      const question = state.questions[state.index];
      const current = Math.min(state.index + 1, state.questions.length);
      els.progressBar.style.width = `${(state.index / state.questions.length) * 100}%`;
      els.countText.textContent = `${current} / ${state.questions.length}`;
      els.wordText.textContent = question.word;
      els.hintText.textContent = `${currentQuiz().hintLabel}: ${question.part}`;
      els.feedbackTitle.textContent = "答えを選んでください";
      els.feedbackText.textContent = "4つの選択肢から正しい説明を選びます。";
      els.nextButton.disabled = true;
      els.nextButton.textContent = state.index === state.questions.length - 1 ? "結果を見る" : "次へ";
      els.choices.innerHTML = "";

      question.choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => answer(choice));
        els.choices.append(button);
      });

      state.answered = false;
      speak(question.word);
      startTimer();
    }

    function answer(choice, timedOut = false) {
      if (state.answered) return;
      stopTimer();
      const question = state.questions[state.index];
      const correct = !timedOut && choice === question.answer;
      state.answered = true;
      state.selected = choice;

      if (correct) {
        state.score += 1;
        removeMistake(question.word);
        els.feedbackTitle.textContent = "正解です";
        els.feedbackText.textContent = `${question.word} は「${question.answer}」です。`;
      } else {
        addMistake(question);
        els.feedbackTitle.textContent = timedOut ? "時間切れです" : "惜しいです";
        els.feedbackText.textContent = `正解は「${question.answer}」です。`;
      }

      [...els.choices.children].forEach(button => {
        button.disabled = true;
        if (button.textContent === question.answer) button.classList.add("correct");
        if (button.textContent === choice && !correct) button.classList.add("wrong");
      });

      els.nextButton.disabled = false;
      els.progressBar.style.width = `${((state.index + 1) / state.questions.length) * 100}%`;
      renderStats();
      renderReview();
    }

    function timeUp() {
      answer(null, true);
    }

    function next() {
      if (state.index < state.questions.length - 1) {
        state.index += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const total = state.questions.length;
      const rate = Math.round((state.score / total) * 100);
      els.quizView.classList.add("hidden");
      els.resultView.classList.add("active");
      els.resultScore.textContent = `${state.score} / ${total}`;
      els.resultBadge.textContent = rate >= 90 ? "すばらしい" : rate >= 70 ? "いい調子" : "復習チャンス";
      els.resultMessage.textContent = rate >= 90
        ? "かなり定着しています。この調子で別レベルもいけます。"
        : rate >= 70
          ? "あと少しで安定します。間違えた単語を軽く見直しましょう。"
          : "復習リストからもう一度出すと、かなり覚えやすくなります。";
    }

    function addMistake(question) {
      const item = {
        word: question.word,
        answer: question.answer,
        part: question.part,
        choices: question.choices.filter(choice => choice !== question.answer),
        level: question.level
      };
      state.mistakes = [item, ...state.mistakes.filter(mistake => mistake.word !== item.word)].slice(0, 20);
      saveMistakes();
    }

    function removeMistake(word) {
      state.mistakes = state.mistakes.filter(mistake => mistake.word !== word);
      saveMistakes();
    }

    function renderStats() {
      const answered = state.questions.slice(0, state.index).length + (state.answered ? 1 : 0);
      const rate = answered ? Math.round((state.score / answered) * 100) : 0;
      els.correctStat.textContent = state.score;
      els.rateStat.textContent = `${rate}%`;
    }

    function renderReview() {
      if (!state.mistakes.length) {
        els.reviewList.innerHTML = '<p class="empty">まだ間違えた単語はありません。</p>';
        els.reviewButton.disabled = true;
        return;
      }

      els.reviewButton.disabled = false;
      els.reviewList.innerHTML = "";
      state.mistakes.forEach(item => {
        const row = document.createElement("div");
        row.className = "review-item";
        row.innerHTML = `<strong>${item.word}</strong><span>${item.answer} / ${item.part}</span>`;
        els.reviewList.append(row);
      });
    }

    els.nextButton.addEventListener("click", next);
    els.againButton.addEventListener("click", () => startQuiz());
    els.levelSelect.addEventListener("change", event => {
      state.level = event.target.value;
      startQuiz();
    });
    els.timerToggle.addEventListener("click", () => {
      state.timerEnabled = !state.timerEnabled;
      localStorage.setItem("quizTimerEnabled", JSON.stringify(state.timerEnabled));
      renderTimerControls();
      if (state.timerEnabled && !state.answered && state.questions[state.index]) {
        startTimer();
      } else {
        stopTimer();
      }
    });
    els.timerSelect.addEventListener("change", event => {
      state.timerSeconds = Number(event.target.value);
      localStorage.setItem("quizTimerSeconds", String(state.timerSeconds));
      renderTimerControls();
      if (state.timerEnabled && !state.answered && state.questions[state.index]) {
        startTimer();
      }
    });
    els.csvInput.addEventListener("change", async event => {
      const [file] = event.target.files;
      if (!file) return;
      try {
        applyWordBank(normalizeCsv(await file.text()), file.name);
      } catch (error) {
        els.csvStatus.textContent = `CSVを読み込めませんでした: ${error.message}`;
      } finally {
        event.target.value = "";
      }
    });
    els.soundToggle.addEventListener("click", () => {
      if (!currentQuiz().speak) return;
      state.sound = !state.sound;
      localStorage.setItem("vocabSound", JSON.stringify(state.sound));
      renderQuizChrome();
      els.soundToggle.setAttribute("aria-pressed", String(state.sound));
      if (state.sound && state.questions[state.index]) speak(state.questions[state.index].word);
    });
    els.resetButton.addEventListener("click", () => {
      state.mistakes = [];
      localStorage.removeItem(mistakeKey());
      startQuiz();
    });
    els.reviewButton.addEventListener("click", () => {
      if (state.mistakes.length) startQuiz(state.mistakes);
    });

    if (!quizzes[state.activeQuiz]) state.activeQuiz = "english";
    renderQuizChrome();
    renderTimerControls();
    loadCsv();
  </script>
